<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e2d50"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Arms -->
  <line x1="32" y1="32" x2="15" y2="15" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="49" y2="15" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="15" y2="49" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="49" y2="49" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Rotors -->
  <g filter="url(#glow)">
    <!-- Top-left rotor -->
    <circle cx="15" cy="15" r="7.5" fill="#0f1d3d" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="9" y1="15" x2="21" y2="15" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="15" y1="9" x2="15" y2="21" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>

    <!-- Top-right rotor -->
    <circle cx="49" cy="15" r="7.5" fill="#0f1d3d" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="43" y1="15" x2="55" y2="15" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="49" y1="9" x2="49" y2="21" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>

    <!-- Bottom-left rotor -->
    <circle cx="15" cy="49" r="7.5" fill="#0f1d3d" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="9" y1="49" x2="21" y2="49" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="15" y1="43" x2="15" y2="55" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>

    <!-- Bottom-right rotor -->
    <circle cx="49" cy="49" r="7.5" fill="#0f1d3d" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="43" y1="49" x2="55" y2="49" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="49" y1="43" x2="49" y2="55" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Central body -->
  <circle cx="32" cy="32" r="9" fill="#0f1d3d" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="5.5" fill="url(#body)"/>
  <!-- Camera lens -->
  <circle cx="32" cy="32" r="2.5" fill="#0a0e1a" opacity="0.7"/>
  <circle cx="30.8" cy="30.8" r="1" fill="white" opacity="0.4"/>
</svg>
